name: SDLC Trigger
on:
  push:
    branches: [main]
    paths:
      - 'projects/*/backlog/**/*.md'

jobs:
  trigger-n8n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Controleer auteur (voorkom loop)
        id: check_author
        run: |
          AUTHOR="${{ github.event.head_commit.author.name }}"
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$AUTHOR" == "sdlc-agent" ]] || [[ "$MSG" == *"[sdlc-skip]"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Detecteer gewijzigde backlog bestanden
        id: changed
        if: steps.check_author.outputs.skip == 'false'
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD \
            | grep 'projects/.*/backlog/.*\.md$' \
            | tr '\n' '|')
          echo "files=${FILES%|}" >> $GITHUB_OUTPUT

      - name: Stuur naar n8n
        if: steps.check_author.outputs.skip == 'false' && steps.changed.outputs.files != ''
        run: |
          curl -sf -X POST "${{ secrets.N8N_SDLC_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -H "X-Secret: ${{ secrets.N8N_SECRET }}" \
            -d "{
              \"files\": \"${{ steps.changed.outputs.files }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"pusher\": \"${{ github.actor }}\"
            }"
